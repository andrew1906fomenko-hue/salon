"""
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { font-family: sans-serif; background:#f5f5f5; padding:10px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:12px; }
button { padding:10px; margin:5px; border-radius:10px; border:none; }
.free { background:#4caf50; color:white; }
</style>
</head>
<body>

<div class="card">
<input id="name" placeholder="Имя">
</div>

<div class="card">
<select id="service">
<option>Стрижка</option>
<option>Окрашивание</option>
<option>Укладка</option>
</select>
</div>

<div class="card">
<input type="date" id="date">
</div>

<div class="card" id="times"></div>

<button onclick="sendData()">Записаться</button>

<script>
const times = ["10:00","11:00","12:00","13:00","14:00"];
let selected = null;

const container = document.getElementById("times");

times.forEach(t => {
  const btn = document.createElement("button");
  btn.innerText = t;
  btn.className = "free";

  btn.onclick = () => {
    selected = t;
    document.querySelectorAll("button").forEach(b => b.style.opacity="1");
    btn.style.opacity="0.5";
  };

  container.appendChild(btn);
});

function sendData(){
  const data = {
    name: document.getElementById("name").value,
    service: document.getElementById("service").value,
    date: document.getElementById("date").value,
    time: selected
  };

  Telegram.WebApp.sendData(JSON.stringify(data));
}
</script>

"""
